name: gt7_telemetry_app
description: Android-first Flutter shell for the GT7 telemetry port.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  gt7_design_system:
    path: packages/gt7_design_system
  gt7_domain:
    path: packages/gt7_domain
  gt7_telemetry:
    path: packages/gt7_telemetry
  ps_discovery:
    path: packages/ps_discovery
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true