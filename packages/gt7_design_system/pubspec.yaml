name: gt7_design_system
description: Reusable Flutter theme and shared UI primitives for GT7-styled apps.
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.11.5
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/logo_banana.png
    - assets/images/logo_banana_black.png
    - assets/images/logo_race_tactician.png
    - assets/images/logo_race_tactician_black.png
